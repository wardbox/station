name: build-blog

# Build only — never deploy (build-spec Principle 6: Actions builds and pushes
# an image; Argo CD deploys by reconciling git). On main, this workflow commits
# the built image digest back to infra/k8s; Argo CD performs the cluster rollout.
#
# No path filters: posting is a git push (Principle 7), and posts are .md, so
# every push to main must be able to rebuild the blog.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-blog-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # Only authenticate when we actually push. Pull requests build to validate
      # the Dockerfile but never publish.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REV=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Single-arch for now; arch follows the node type, still a Left-open
          # decision in the build spec. Add linux/arm64 here once that's settled.
          platforms: linux/amd64

      - name: Update GitOps image digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          image="${IMAGE}@${{ steps.build.outputs.digest }}"
          sed -i "s#image: ghcr.io/wardbox/station@sha256:[0-9a-f]\{64\}#image: ${image}#" infra/k8s/blog/blog.yaml
          if git diff --quiet -- infra/k8s/blog/blog.yaml; then
            echo "Digest already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/blog/blog.yaml
          git commit -m "chore(k8s): update blog image digest [skip ci]"
          git push
