name: build-blog

# Build only — never deploy (build-spec Principle 6: Actions builds and pushes
# an image; Argo CD deploys by reconciling git). On main, this workflow commits
# the built image digest back to infra/k8s; Argo CD performs the cluster rollout.
#
# No path filters: posting is a git push (Principle 7), and posts are .md, so
# every push to main must be able to rebuild the blog.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-blog-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  validate:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=short

      - name: Build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REV=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Single-arch for now; arch follows the node type, still a Left-open
          # decision in the build spec. Add linux/arm64 here once that's settled.
          platforms: linux/amd64

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REV=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Single-arch for now; arch follows the node type, still a Left-open
          # decision in the build spec. Add linux/arm64 here once that's settled.
          platforms: linux/amd64

      - name: Update GitOps image digest
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          image="${IMAGE}@${{ steps.build.outputs.digest }}"
          IMAGE="${IMAGE}" NEW_IMAGE="${image}" perl -0pi -e 's#image: \Q$ENV{IMAGE}\E\@sha256:[0-9a-f]{64}#image: $ENV{NEW_IMAGE}#' infra/k8s/blog/blog.yaml
          if git diff --quiet -- infra/k8s/blog/blog.yaml; then
            echo "Digest already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/blog/blog.yaml
          git commit -m "chore(k8s): update blog image digest [skip ci]"
          if ! git push; then
            git fetch origin main
            git rebase origin/main
            git push
          fi
