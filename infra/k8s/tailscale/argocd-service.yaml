# Private Argo CD entrypoint. The Tailscale operator turns this Service into a
# tailnet-only device named `argocd` (MagicDNS), fronting argocd-server.
apiVersion: v1
kind: Service
metadata:
  name: argocd-tailnet
  namespace: argocd
  annotations:
    tailscale.com/hostname: argocd
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: https
      port: 443
      targetPort: 8080
      protocol: TCP
