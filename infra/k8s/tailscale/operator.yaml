# Tailscale Kubernetes Operator. The OAuth credentials are created out-of-band
# as Secret tailscale/operator-oauth; do not commit them.
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: tailscale-operator
  namespace: kube-system
spec:
  repo: https://pkgs.tailscale.com/helmcharts
  chart: tailscale-operator
  version: 1.98.4
  targetNamespace: tailscale
  createNamespace: false
  valuesContent: |-
    operatorConfig:
      hostname: station-k8s-operator
    proxyConfig:
      defaultTags: "tag:k8s"
