apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stationsystems-dev-wildcard
  namespace: blog
spec:
  secretName: stationsystems-dev-wildcard-tls
  issuerRef:
    name: letsencrypt-dns01-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - stationsystems.dev
    - "*.stationsystems.dev"
