# Optional public entrypoint for Argo CD, locked down before it reaches Argo.
# Defense-in-depth:
# - wildcard TLS at Traefik
# - Basic Auth middleware backed by an out-of-band Secret
# - Argo CD's own login remains the final gate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stationsystems-dev-wildcard
  namespace: argocd
spec:
  secretName: stationsystems-dev-wildcard-tls
  issuerRef:
    name: letsencrypt-dns01-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - stationsystems.dev
    - "*.stationsystems.dev"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-basic-auth
  namespace: argocd
spec:
  basicAuth:
    secret: argocd-basic-auth
    removeHeader: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: argocd-argocd-basic-auth@kubernetescrd
    # Public TLS terminates at Traefik; the in-cluster hop to argocd-server uses
    # HTTP on service port 80. See argocd/server-insecure.yaml.
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - argo.stationsystems.dev
      secretName: stationsystems-dev-wildcard-tls
  rules:
    - host: argo.stationsystems.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
