# Argo serves HTTPS on its private Tailscale entrypoint. cert-manager writes
# the certificate to argocd-server-tls, which Argo CD loads automatically.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-tls
  namespace: argocd
spec:
  secretName: argocd-server-tls
  issuerRef:
    name: letsencrypt-dns01-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - argo.stationsystems.dev
